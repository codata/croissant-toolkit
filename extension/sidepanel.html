<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croissant Converter</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <header>
        <h1>Croissant Converter</h1>
        <p class="subtitle">Convert any page to Croissant JSON-LD</p>
    </header>

    <section id="croissant-section">
        <button id="generate-btn">Generate Croissant</button>
        <div id="status" class="hidden"></div>
        <div id="croissant-output" class="hidden">
            <div class="output-header">
                <span>Croissant JSON-LD</span>
                <div class="output-actions">
                    <button id="copy-btn" title="Copy">Copy</button>
                    <button id="download-btn" title="Download">Download</button>
                </div>
            </div>
            <pre id="croissant-json"></pre>
        </div>
    </section>

    <section id="chat-section" class="hidden">
        <h2>Chat</h2>
        <div id="chat-history"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Ask about this page..." />
            <button id="chat-send">Send</button>
        </div>
    </section>

    <script src="sidepanel.js"></script>
</body>
</html>
